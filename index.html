<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>발주 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f5f5f5; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 10px 14px; border: 1px solid #ddd; text-align: left; }
    th { background: #3B8BD4; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
  </style>
</head>
<body>
  <h1>📦 발주 현황 대시보드</h1>
  <canvas id="chart" width="600" height="200"></canvas>
  <table id="table"><tr><td>불러오는 중...</td></tr></table>

  <script>
    const SHEET_ID = "1p-ko7c4--yUwYOYE2fL8X6Z1U3O1lWoJ36AZuBanGmQ";
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

    fetch(URL)
      .then(r => r.text())
      .then(csv => {
        const rows = csv.trim().split("\n").map(r => r.split(","));
        const headers = rows[0];
        const data = rows.slice(1);

        // 테이블 렌더링
        const table = document.getElementById("table");
        table.innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr>`
          + data.map(row => `<tr>${row.map(d => `<td>${d}</td>`).join("")}</tr>`).join("");

        // 차트 (예: 2열 = 수량)
        new Chart(document.getElementById("chart"), {
          type: "bar",
          data: {
            labels: data.map(r => r[0]),
            datasets: [{ label: "발주 수량", data: data.map(r => Number(r[1])), backgroundColor: "#3B8BD4" }]
          }
        });
      });
  </script>
</body>
</html>
